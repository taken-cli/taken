name: Publish

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    uses: ./.github/workflows/_build.yml

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - uses: astral-sh/setup-uv@v5

      - name: Publish
        run: uv publish
